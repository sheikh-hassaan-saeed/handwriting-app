<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="leftBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
    <linearGradient id="rightBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="skinL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fddbb4"/>
      <stop offset="100%" stop-color="#f0a060"/>
    </linearGradient>
    <filter id="ds">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.15)"/>
    </filter>
  </defs>

  <!-- Left panel background -->
  <rect x="0" y="0" width="396" height="450" fill="url(#leftBg)"/>
  <!-- Right panel background -->
  <rect x="404" y="0" width="396" height="450" fill="url(#rightBg)"/>
  <!-- Centre divider -->
  <rect x="395" y="0" width="10" height="450" fill="white"/>
  <text x="400" y="234" text-anchor="middle" font-size="22" font-weight="900" fill="#6b7280" transform="rotate(0)">VS</text>

  <!-- ── LEFT PANEL: Finger Writing ── -->
  <text x="198" y="46" text-anchor="middle" font-size="20" font-weight="800" fill="#be123c">❌  Finger Writing</text>
  <rect x="30" y="56" width="336" height="2" rx="1" fill="#fda4af"/>

  <!-- Cramped hand (fingers bent, tense) -->
  <g transform="translate(60,85)" filter="url(#ds)">
    <!-- Wrist/palm - compressed, tense shape -->
    <ellipse cx="150" cy="230" rx="75" ry="42" fill="#fddbb4" stroke="#e0904a" stroke-width="1"/>
    <!-- Finger 1 - severely bent, cramped -->
    <path d="M120,230 C115,210 108,188 112,165 C116,148 128,142 136,152 C144,162 142,188 138,210 C134,225 128,235 125,240 Z"
          fill="url(#skinL)" stroke="#d4804a" stroke-width="0.8"/>
    <!-- Finger 2 -->
    <path d="M140,232 C136,212 132,190 136,168 C140,151 152,146 158,156 C164,168 161,192 156,214 C151,230 146,240 143,244 Z"
          fill="#f0b882" stroke="#d4804a" stroke-width="0.8"/>
    <!-- Finger 3 -->
    <path d="M162,235 C160,216 158,195 161,174 C164,158 174,153 180,162 C185,172 182,195 177,216 C173,232 168,242 165,246 Z"
          fill="url(#skinL)" stroke="#d4804a" stroke-width="0.8"/>
    <!-- Thumb (clenched) -->
    <path d="M100,248 C88,234 82,216 88,200 C94,186 106,184 112,196 C118,208 116,228 112,246 Z"
          fill="#fddbb4" stroke="#d4804a" stroke-width="0.8"/>
    <!-- Pen (tiny, cramped in fingers) -->
    <rect x="133" y="90" width="8" height="165" rx="4" fill="#1e3a8a" transform="rotate(5,137,172)"/>
    <path d="M131,255 L137,280 L143,255 Z" fill="#c8980a" transform="rotate(5,137,268)"/>
    <!-- Tension lines radiating from knuckles -->
    <line x1="145" y1="175" x2="162" y2="158" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <line x1="155" y1="180" x2="175" y2="168" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <line x1="148" y1="190" x2="165" y2="182" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  </g>

  <!-- Cramped writing sample -->
  <rect x="30" y="330" width="336" height="80" rx="8" fill="white" stroke="#fda4af" stroke-width="1.5"/>
  <text x="52" y="356" font-family="Arial,sans-serif" font-size="13" fill="#be123c" font-style="italic">inconsistent sizing</text>
  <line x1="42" y1="365" x2="355" y2="365" stroke="#fecdd3" stroke-width="0.8"/>
  <!-- Wobbly cramped letters -->
  <text x="52" y="382" font-family="Georgia,serif" font-style="italic" font-size="15" fill="#374151" transform="rotate(2,52,382)">Hello</text>
  <text x="102" y="379" font-family="Georgia,serif" font-style="italic" font-size="17" fill="#374151" transform="rotate(-3,102,379)"> World</text>
  <text x="185" y="384" font-family="Georgia,serif" font-style="italic" font-size="13" fill="#374151" transform="rotate(4,185,384)"> writing</text>
  <text x="260" y="380" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#374151" transform="rotate(-2,260,380)"> here</text>
  <line x1="42" y1="390" x2="355" y2="390" stroke="#fecdd3" stroke-width="0.8"/>

  <!-- Left bullets -->
  <text x="48" y="430" font-size="12" fill="#be123c">✗ Hand fatigues quickly</text>
  <text x="220" y="430" font-size="12" fill="#be123c">✗ Uneven letterforms</text>

  <!-- ── RIGHT PANEL: Arm Movement ── -->
  <text x="602" y="46" text-anchor="middle" font-size="20" font-weight="800" fill="#15803d">✓  Arm Movement</text>
  <rect x="434" y="56" width="336" height="2" rx="1" fill="#86efac"/>

  <!-- Relaxed hand (open, natural, using arm) -->
  <g transform="translate(450,85)" filter="url(#ds)">
    <!-- Arm visible -->
    <path d="M60,280 C50,265 45,240 48,215 C51,192 60,180 75,182 C90,184 98,198 100,220 C102,242 98,262 95,278 Z"
          fill="#fddbb4" stroke="#d4a060" stroke-width="1" opacity="0.6"/>
    <!-- Relaxed palm -->
    <ellipse cx="140" cy="235" rx="72" ry="40" fill="#fddbb4" stroke="#d4a060" stroke-width="1"/>
    <!-- Relaxed fingers - natural, not tense -->
    <path d="M115,235 C112,215 110,192 114,170 C118,152 130,147 138,158 C144,168 142,192 138,215 C135,230 128,242 122,245 Z"
          fill="url(#skinL)" stroke="#d4a060" stroke-width="0.8"/>
    <path d="M138,237 C135,217 133,195 136,174 C140,156 152,152 158,162 C163,173 161,196 156,218 C152,234 146,244 142,247 Z"
          fill="#f0b882" stroke="#d4a060" stroke-width="0.8"/>
    <path d="M160,238 C158,219 157,198 160,178 C163,161 173,157 178,166 C183,176 181,198 176,220 C172,236 167,245 164,248 Z"
          fill="url(#skinL)" stroke="#d4a060" stroke-width="0.8"/>
    <!-- Thumb relaxed -->
    <path d="M98,252 C87,238 83,220 89,205 C95,191 106,190 112,202 C117,212 115,232 112,248 Z"
          fill="#fddbb4" stroke="#d4a060" stroke-width="0.8"/>
    <!-- Pen (natural angle, relaxed hold) -->
    <rect x="131" y="90" width="9" height="160" rx="4.5" fill="#1e3a8a" transform="rotate(1,135,170)"/>
    <path d="M129,248 L135,272 L141,248 Z" fill="#c8980a" transform="rotate(1,135,260)"/>
    <!-- Movement arc arrow -->
    <path d="M30,200 Q20,235 30,265" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M30,265 L22,258 M30,265 L38,258" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
    <text x="0" y="238" font-size="10" font-weight="700" fill="#16a34a" transform="rotate(-90,10,238)">ARM</text>
  </g>

  <!-- Smooth writing sample -->
  <rect x="434" y="330" width="336" height="80" rx="8" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="455" y="356" font-family="Arial,sans-serif" font-size="13" fill="#15803d" font-style="italic">consistent, fluid, even</text>
  <line x1="446" y1="365" x2="759" y2="365" stroke="#bbf7d0" stroke-width="0.8"/>
  <!-- Smooth, consistent letters -->
  <text x="455" y="384" font-family="Georgia,serif" font-style="italic" font-size="16" fill="#374151">Hello World writing here</text>
  <line x1="446" y1="390" x2="759" y2="390" stroke="#bbf7d0" stroke-width="0.8"/>

  <!-- Right bullets -->
  <text x="452" y="430" font-size="12" fill="#15803d">✓ Arm stays relaxed</text>
  <text x="620" y="430" font-size="12" fill="#15803d">✓ Even, fluid strokes</text>
</svg>
