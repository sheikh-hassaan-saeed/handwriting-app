<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="uiBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8faff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="paperOut" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#faf7ee"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="rgba(79,70,229,0.15)"/>
    </filter>
    <filter id="panelShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.10)"/>
    </filter>
  </defs>

  <!-- Outer frame / desktop bg -->
  <rect width="800" height="480" fill="#e2e8f0"/>
  <!-- Browser chrome -->
  <rect x="20" y="12" width="760" height="456" rx="10" fill="white" filter="url(#cardShadow)"/>
  <!-- Browser bar -->
  <rect x="20" y="12" width="760" height="36" rx="10 10 0 0" fill="#f1f5f9"/>
  <!-- Browser dots -->
  <circle cx="46" cy="30" r="6" fill="#ef4444"/>
  <circle cx="66" cy="30" r="6" fill="#f59e0b"/>
  <circle cx="86" cy="30" r="6" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="140" y="20" width="420" height="20" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="34" text-anchor="middle" font-size="10" fill="#64748b">handwritingmaker.com</text>
  <!-- Lock icon -->
  <rect x="148" y="26" width="6" height="5" rx="1" fill="#22c55e"/>
  <path d="M147,28 Q151,24 155,28" stroke="#22c55e" stroke-width="1.2" fill="none"/>

  <!-- ── App Header ── -->
  <rect x="20" y="48" width="760" height="44" fill="url(#headerGrad)"/>
  <text x="52" y="76" font-size="20" font-weight="800" fill="white" letter-spacing="-0.5">HandwritingMaker</text>
  <text x="240" y="76" font-size="10" fill="#c7d2fe" letter-spacing="2">FREE TEXT TO HANDWRITING CONVERTER</text>
  <rect x="660" y="58" width="100" height="24" rx="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="710" y="75" text-anchor="middle" font-size="11" fill="white">Blog ↗</text>

  <!-- ── Two-panel layout ── -->
  <!-- Left panel: Controls -->
  <rect x="28" y="100" width="258" height="396" rx="8" fill="white" filter="url(#panelShadow)"/>
  <text x="44" y="125" font-size="13" font-weight="700" fill="#1e293b">Your Text</text>
  <!-- Textarea -->
  <rect x="38" y="132" width="238" height="90" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="153" font-size="11" fill="#94a3b8" font-style="italic">Type or paste your text here…</text>
  <text x="50" y="170" font-family="Georgia,serif" font-style="italic" font-size="12" fill="#374151">The quick brown fox</text>
  <text x="50" y="186" font-family="Georgia,serif" font-style="italic" font-size="12" fill="#374151">jumps over the lazy dog.</text>
  <text x="260" y="228" text-anchor="end" font-size="9" fill="#94a3b8">85 characters</text>

  <!-- Style picker -->
  <text x="44" y="250" font-size="12" font-weight="700" fill="#1e293b">Handwriting Style</text>
  <!-- Active style button -->
  <rect x="38" y="256" width="238" height="30" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="52" y="276" font-family="Georgia,serif" font-style="italic" font-size="14" fill="#4338ca">Classic Cursive</text>
  <text x="260" y="276" text-anchor="end" font-size="9" fill="#6366f1">✓ active</text>
  <!-- Other style buttons (inactive) -->
  <rect x="38" y="292" width="238" height="26" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="310" font-size="12" fill="#64748b">Doctor Scrawl</text>
  <rect x="38" y="323" width="238" height="26" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="52" y="341" font-size="12" fill="#64748b">Neat Print</text>

  <!-- Paper picker -->
  <text x="44" y="372" font-size="12" font-weight="700" fill="#1e293b">Paper</text>
  <rect x="38" y="378" width="112" height="28" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="94" y="397" text-anchor="middle" font-size="11" fill="#4338ca">📓 Lined</text>
  <rect x="156" y="378" width="120" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="216" y="397" text-anchor="middle" font-size="11" fill="#64748b">⬜ Plain</text>

  <!-- Action buttons -->
  <rect x="38" y="422" width="238" height="32" rx="8" fill="#6366f1"/>
  <text x="157" y="443" text-anchor="middle" font-size="13" font-weight="700" fill="white">↓  Download PNG</text>
  <rect x="38" y="460" width="238" height="28" rx="8" fill="#374151"/>
  <text x="157" y="479" text-anchor="middle" font-size="12" font-weight="600" fill="white">↓  Download PDF</text>

  <!-- Right panel: Canvas output -->
  <rect x="298" y="100" width="482" height="396" rx="8" fill="url(#paperOut)" filter="url(#panelShadow)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- "Live Preview" label -->
  <text x="316" y="122" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">LIVE PREVIEW</text>
  <text x="762" y="122" text-anchor="end" font-size="10" fill="#6366f1">↺ Randomize</text>
  <line x1="298" y1="128" x2="780" y2="128" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Red margin line on output -->
  <line x1="340" y1="128" x2="340" y2="496" stroke="#fca5a5" stroke-width="1.5" opacity="0.6"/>

  <!-- Blue ruled lines -->
  <line x1="298" y1="158" x2="780" y2="158" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="192" x2="780" y2="192" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="226" x2="780" y2="226" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="260" x2="780" y2="260" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="294" x2="780" y2="294" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="328" x2="780" y2="328" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="362" x2="780" y2="362" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="396" x2="780" y2="396" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="430" x2="780" y2="430" stroke="#dbeafe" stroke-width="0.8"/>
  <line x1="298" y1="464" x2="780" y2="464" stroke="#dbeafe" stroke-width="0.8"/>

  <!-- Handwriting output text (rendered in canvas) -->
  <text x="350" y="153" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="23" fill="#1e3a8a" transform="rotate(-0.5,350,153)">The quick brown fox</text>
  <text x="350" y="187" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="23" fill="#1e3a8a" transform="rotate(0.4,350,187)">jumps over the lazy dog.</text>
  <text x="350" y="255" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="21" fill="#1e3a8a" opacity="0.75" transform="rotate(-0.3,350,255)">Pack my box with five</text>
  <text x="350" y="289" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="21" fill="#1e3a8a" opacity="0.7" transform="rotate(0.5,350,289)">dozen liquor jugs.</text>

  <!-- Cursor blink on canvas -->
  <rect x="348" y="310" width="2" height="20" rx="1" fill="#4f46e5" opacity="0.6"/>
</svg>
