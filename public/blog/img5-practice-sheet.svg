<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="paperBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="100%" stop-color="#faf8f0"/>
    </linearGradient>
    <filter id="paperShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="800" height="500" fill="#e8e4dc"/>

  <!-- Paper sheet -->
  <rect x="60" y="28" width="680" height="444" rx="3" fill="url(#paperBg)" filter="url(#paperShadow)"/>

  <!-- Red margin line -->
  <line x1="118" y1="28" x2="118" y2="472" stroke="#fca5a5" stroke-width="1.8" opacity="0.8"/>

  <!-- ── HEADER AREA ── -->
  <rect x="60" y="28" width="680" height="68" rx="3 3 0 0" fill="#4f46e5"/>
  <text x="400" y="60" text-anchor="middle" font-size="22" font-weight="800" fill="white" letter-spacing="0.5">Handwriting Practice Sheet</text>
  <text x="400" y="82" text-anchor="middle" font-size="12" fill="#c7d2fe">Study the sample at top · Copy on the lines below · Focus on consistency</text>

  <!-- ── SAMPLE STYLE SECTION ── -->
  <rect x="68" y="96" width="664" height="36" rx="4" fill="#eef2ff"/>
  <text x="128" y="112" font-size="10" font-weight="700" fill="#4338ca" letter-spacing="1">SAMPLE STYLE  ▼  Copy this below</text>
  <!-- Sample handwriting -->
  <text x="128" y="124" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="22" fill="#1e3a8a" letter-spacing="1">The quick brown fox jumps over the lazy dog.</text>

  <!-- ── BASELINE RULER LABELS ── -->
  <text x="66" y="152" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,66,152)">ascender</text>
  <text x="66" y="183" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,66,183)">midline</text>
  <text x="66" y="208" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,66,208)">baseline</text>
  <text x="66" y="238" font-size="9" fill="#94a3b8" text-anchor="middle" transform="rotate(-90,66,238)">descender</text>

  <!-- ── PRACTICE LINES (6 sets, each with 4 guide lines) ── -->
  <!-- Set 1 -->
  <line x1="118" y1="148" x2="732" y2="148" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="118" y1="164" x2="732" y2="164" stroke="#93c5fd" stroke-width="0.9"/>
  <line x1="118" y1="180" x2="732" y2="180" stroke="#1d4ed8" stroke-width="1.3"/>
  <line x1="118" y1="196" x2="732" y2="196" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <!-- Set 2 -->
  <line x1="118" y1="216" x2="732" y2="216" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="118" y1="232" x2="732" y2="232" stroke="#93c5fd" stroke-width="0.9"/>
  <line x1="118" y1="248" x2="732" y2="248" stroke="#1d4ed8" stroke-width="1.3"/>
  <line x1="118" y1="264" x2="732" y2="264" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <!-- Set 3 -->
  <line x1="118" y1="284" x2="732" y2="284" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="118" y1="300" x2="732" y2="300" stroke="#93c5fd" stroke-width="0.9"/>
  <line x1="118" y1="316" x2="732" y2="316" stroke="#1d4ed8" stroke-width="1.3"/>
  <line x1="118" y1="332" x2="732" y2="332" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <!-- Set 4 -->
  <line x1="118" y1="352" x2="732" y2="352" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="118" y1="368" x2="732" y2="368" stroke="#93c5fd" stroke-width="0.9"/>
  <line x1="118" y1="384" x2="732" y2="384" stroke="#1d4ed8" stroke-width="1.3"/>
  <line x1="118" y1="400" x2="732" y2="400" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <!-- Set 5 -->
  <line x1="118" y1="420" x2="732" y2="420" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>
  <line x1="118" y1="436" x2="732" y2="436" stroke="#93c5fd" stroke-width="0.9"/>
  <line x1="118" y1="452" x2="732" y2="452" stroke="#1d4ed8" stroke-width="1.3"/>
  <line x1="118" y1="468" x2="732" y2="468" stroke="#c7d2fe" stroke-width="0.7" stroke-dasharray="4,4"/>

  <!-- ── Guide line labels (right side) ── -->
  <rect x="733" y="144" width="6" height="56" rx="3" fill="#c7d2fe" opacity="0.6"/>
  <text x="744" y="166" font-size="8" fill="#6366f1">↑</text>
  <text x="744" y="178" font-size="8" fill="#6366f1">—</text>
  <text x="744" y="190" font-size="8" fill="#1d4ed8">base</text>
  <text x="744" y="200" font-size="8" fill="#6366f1">↓</text>

  <!-- ── Practice prompts inside lines ── -->
  <text x="130" y="177" font-family="Georgia,serif" font-style="italic" font-size="19" fill="#c7d2fe" opacity="0.8">The quick brown fox jumps...</text>
  <text x="130" y="245" font-family="Georgia,serif" font-style="italic" font-size="17" fill="#dbeafe" opacity="0.9">Write your practice sentence here</text>

  <!-- ── Line legend at bottom ── -->
  <rect x="68" y="476" width="664" height="22" rx="4" fill="#e0e7ff"/>
  <line x1="88" y1="487" x2="108" y2="487" stroke="#c7d2fe" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="112" y="491" font-size="10" fill="#4338ca">ascender/descender  </text>
  <line x1="258" y1="487" x2="278" y2="487" stroke="#93c5fd" stroke-width="1"/>
  <text x="282" y="491" font-size="10" fill="#4338ca">midline  </text>
  <line x1="348" y1="487" x2="368" y2="487" stroke="#1d4ed8" stroke-width="2"/>
  <text x="372" y="491" font-size="10" fill="#4338ca">baseline  </text>
  <text x="580" y="491" font-size="10" fill="#4338ca" text-anchor="end">handwritingmaker.com</text>
  <text x="732" y="491" font-size="10" fill="#6366f1" font-weight="700">Free ✓</text>
</svg>
